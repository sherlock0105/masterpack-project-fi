# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "4.0"
metadata:
  name: ze3.qm.display.ze3qmdisplay
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          url: http://bgissap3.bgissap.co.kr:8000/
          client: '100'
        app:
          name: ZE3_QM_DISPLAY
          description: 완제품 폐기 현황
          package: ZPE3QM
          transport: EFXK901652
        exclude:
          - /test/
